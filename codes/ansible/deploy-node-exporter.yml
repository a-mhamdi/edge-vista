---
- name: Deploy Prometheus Node Exporter to Raspberry Pi 5 fleet
  hosts: pis
  become: true
  vars:
    node_exporter_version: "1.8.2"
    node_exporter_arch: "arm64"
    node_exporter_port: "9100"
    node_exporter_url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-{{ node_exporter_arch }}.tar.gz"

  tasks:
    - name: Check if node_exporter binary already installed
      ansible.builtin.stat:
        path: /usr/local/bin/node_exporter
      register: node_exporter_check

    - name: Create dedicated node_exporter system user
      ansible.builtin.user:
        name: node_exporter
        system: true
        shell: /usr/sbin/nologin
        create_home: false
      when: not node_exporter_check.stat.exists

    - name: Download and extract Node Exporter
      ansible.builtin.unarchive:
        src: "{{ node_exporter_url }}"
        dest: /tmp
        remote_src: true
      when: not node_exporter_check.stat.exists

    - name: Install node_exporter binary
      ansible.builtin.copy:
        src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-{{ node_exporter_arch }}/node_exporter"
        dest: /usr/local/bin/node_exporter
        owner: root
        group: root
        mode: "0755"
        remote_src: true
      when: not node_exporter_check.stat.exists

    - name: Install systemd service for node_exporter
      ansible.builtin.template:
        src: node-exporter.service.j2
        dest: /etc/systemd/system/node_exporter.service
        mode: "0644"
      notify: Reload systemd

    - name: Enable and start node_exporter service
      ansible.builtin.systemd:
        name: node_exporter
        enabled: true
        state: started
        daemon_reload: true

    - name: Clean up downloaded archive
      ansible.builtin.file:
        path: "/tmp/node_exporter-{{ node_exporter_version }}.linux-{{ node_exporter_arch }}"
        state: absent

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true
