<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>ESP32 WebSocket Test — Potentiometer</title>
    <style>
body {
  font-family: "Fira Code", monospace;
  background: #1e1e1e;
  color: #e0e0e0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  margin: 0;
}
        h1 {
          color: #0f766e;
          font-size: 1.2rem;
          margin-bottom: 0.5rem;
        }
        #status {
          font-size: 0.9rem;
          margin-bottom: 2rem;
        }
        #status.connected { color: #0f766e; }
        #status.disconnected { color: #7a1f1f; }

        #value {
          font-size: 4rem;
          font-weight: bold;
          color: #fff;
        }

        #bar-container {
          width: 300px;
          height: 20px;
          background: #333;
          border-radius: 10px;
          overflow: hidden;
          margin-top: 1.5rem;
        }
        #bar {
          height: 100%;
          width: 0%;
          background: #0f766e;
          transition: width 0.15s ease-out;
        }

        #controls {
          margin-top: 2rem;
          display: flex;
          gap: 1rem;
        }
        input {
          background: #2a2a2a;
          border: 1px solid #444;
          color: #e0e0e0;
          padding: 0.4rem 0.6rem;
          border-radius: 4px;
          font-family: inherit;
        }
        button {
          background: #0f766e;
          border: none;
          color: #fff;
          padding: 0.4rem 1rem;
          border-radius: 4px;
          cursor: pointer;
          font-family: inherit;
        }
        button:hover {
          background: #0d5c56;
        }

        #log {
          margin-top: 2rem;
          width: 400px;
          max-height: 120px;
          overflow-y: auto;
          font-size: 0.75rem;
          color: #888;
          background: #151515;
          padding: 0.5rem;
          border-radius: 4px;
        }
    </style>
  </head>
  <body>

    <h1>ESP32 WebSocket Test</h1>
    <div id="status" class="disconnected">Disconnected</div>

    <div id="value">--</div>
    <div id="bar-container"><div id="bar"></div></div>

    <div id="controls">
      <input id="host" type="text" placeholder="esp32 ip or host" value="192.168.1.100">
      <input id="port" type="text" placeholder="port" value="81" style="width: 60px;">
      <button id="connectBtn">Connect</button>
    </div>

    <div id="log"></div>

    <script>
      let ws = null;
      const statusEl = document.getElementById("status");
      const valueEl = document.getElementById("value");
      const barEl = document.getElementById("bar");
      const logEl = document.getElementById("log");
      const connectBtn = document.getElementById("connectBtn");
      const hostInput = document.getElementById("host");
      const portInput = document.getElementById("port");

      function log(msg) {
        const line = document.createElement("div");
        line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
        logEl.appendChild(line);
        logEl.scrollTop = logEl.scrollHeight;
      }

      function setStatus(connected) {
        statusEl.textContent = connected ? "connected" : "disconnected";
        statusEl.className = connected ? "connected" : "disconnected";
      }

      function connect() {
        if (ws) {
          ws.close();
        }

        const host = hostInput.value.trim();
        const port = portInput.value.trim();
        const url = `ws://${host}:${port}/pot`;

        log(`Connecting to ${url} ...`);
        ws = new WebSocket(url);

        ws.onopen = () => {
          setStatus(true);
          log("Connected");
        };

        ws.onclose = () => {
          setStatus(false);
          log("Disconnected");
        };

        ws.onerror = (err) => {
          log("Error — check host/port and that the board is reachable");
        };

        ws.onmessage = (event) => {
          try {
            const data = JSON.parse(event.data);
            if (typeof data.pot !== "undefined") {
              valueEl.textContent = data.pot;
              const pct = Math.min(100, Math.max(0, (data.pot / 4095) * 100));
              barEl.style.width = pct + "%";
            }
          } catch (e) {
            log("Received non-JSON: " + event.data);
          }
        };
      }

      connectBtn.addEventListener("click", connect);
    </script>

  </body>
</html>
